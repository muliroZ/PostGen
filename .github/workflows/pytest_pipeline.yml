name: PyTest Pipeline

on:
    push:
        branches: [main, dev]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                python-version: [3.11, 3.12, 3.13]
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              
            - name: Install uv
              uses: astral-sh/setup-uv@v3
              with:
                enable-cache: true
                version: "latest"
            
            - name: Python Config
              run: uv python install ${{ matrix.python-version }}

            - name: Install Dependencies
              run: uv sync --frozen

            - name: Run Tests
              run: uv run pytest